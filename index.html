<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상세 페이지 대시보드</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 1100px; margin: 20px auto; padding: 0 16px; }
  h2 { margin-bottom: 4px; }
  .hint { color: #666; font-size: 13px; }
  table { border-collapse: collapse; width: 100%; margin: 12px 0; }
  th, td { border: 1px solid #ccc; padding: 6px; text-align: left; }
  th { background: #f4f4f4; font-size: 13px; }
  td input { width: 100%; border: none; padding: 4px; box-sizing: border-box; }
  td input:focus { outline: 2px solid #4a90e2; }
  .imgGrid { display: flex; flex-wrap: wrap; gap: 12px; margin: 16px 0; }
  .imgBox { width: 160px; border: 2px dashed #bbb; border-radius: 8px; padding: 10px;
    text-align: center; cursor: pointer; background: #fafafa; transition: 0.2s; }
  .imgBox.drag { background: #e3f0ff; border-color: #4a90e2; }
  .imgBox.done { border-color: #2ca02c; border-style: solid; background: #f1fbf1; }
  .imgBox .label { font-size: 13px; font-weight: bold; color: #999; margin-bottom: 6px; }
  .imgBox.done .label { color: #2ca02c; }
  .imgBox { position: relative; }
  .imgBox .delBtn { position: absolute; top: 4px; right: 6px; width: 22px; height: 22px;
    line-height: 22px; text-align: center; background: rgba(0,0,0,0.55); color: #fff;
    border-radius: 50%; font-size: 13px; cursor: pointer; }
  .imgBox .delBtn:hover { background: #e74c3c; }
  .imgBox img { width: 100%; height: 110px; object-fit: cover; border-radius: 4px; }
  .imgBox .placeholder { color: #aaa; font-size: 12px; padding: 30px 0; }
  .imgBox .status { font-size: 11px; color: #4a90e2; margin-top: 4px; min-height: 14px; }
  button { background: #4a90e2; color: #fff; border: none; padding: 10px 20px;
    border-radius: 6px; font-size: 15px; cursor: pointer; }
  button:hover { background: #357abd; }
  #saveMsg { margin-left: 12px; font-weight: bold; }
  .topbar { display: flex; justify-content: space-between; align-items: center; }
  a.cfg { font-size: 13px; }
</style>
</head>
<body>
  <div class="topbar">
    <h2>상품 등록 대시보드</h2>
    <a class="cfg" href="config.html">⚙️ 설정</a>
  </div>
  <p class="hint">표에 텍스트를 입력하고, 아래 각 칸에 해당 이미지를 끌어다 놓으세요.</p>

  <table id="grid">
    <thead><tr id="headRow"></tr></thead>
    <tbody><tr id="valRow"></tr></tbody>
  </table>
  <div style="margin:12px 0; padding:12px; border:1px solid #ddd; border-radius:8px; background:#f9f9f9;">
    <div class="hint" style="margin-bottom:6px;">📋 한 번에 붙여넣기 (엑셀/시트에서 가로로 복사한 내용을 붙이고 분배 누르기)</div>
    <textarea id="pasteBox" style="width:100%; height:70px; box-sizing:border-box; padding:8px;" placeholder="여기에 붙여넣기 (Ctrl+V)"></textarea>
    <button id="distributeBtn" style="margin-top:8px;">칸에 분배</button>
    <span id="distMsg" style="margin-left:10px; font-size:13px; color:#666;"></span>
  </div>

  <div class="imgGrid" id="imgGrid"></div>

    <div>
    <button id="saveBtn">시트에 저장</button>
    <button id="figmaBtn">🎨 Figma 열기</button>
    <span id="saveMsg"></span>
  </div>

<script>
  const cfg = {
    fields: (localStorage.getItem('fields') || '').split(',').map(s => s.trim()).filter(Boolean),
    imageLabels: (localStorage.getItem('imageLabels') || '').split(',').map(s => s.trim()).filter(Boolean),
    cloudName: localStorage.getItem('cloudName') || '',
    uploadPreset: localStorage.getItem('uploadPreset') || '',
    scriptUrl: localStorage.getItem('scriptUrl') || '',
    password: localStorage.getItem('password') || '',
  };

  if (!cfg.scriptUrl || cfg.fields.length === 0) {
    alert('먼저 설정 페이지에서 항목과 URL을 입력하세요.');
    location.href = 'config.html';
  }

  // --- 텍스트 표 만들기 ---
  const headRow = document.getElementById('headRow');
  const valRow = document.getElementById('valRow');
  cfg.fields.forEach(key => {
    const th = document.createElement('th');
    th.textContent = key;
    headRow.appendChild(th);
    const td = document.createElement('td');
    const inp = document.createElement('input');
    inp.dataset.key = key;
    td.appendChild(inp);
    valRow.appendChild(td);
  });

  // --- 이미지 박스 만들기 (라벨별 개별 박스) ---
  const imgGrid = document.getElementById('imgGrid');
  const imageValues = {}; // {라벨: URL}

  cfg.imageLabels.forEach(label => {
    imageValues[label] = '';

    const box = document.createElement('div');
    box.className = 'imgBox';

    const labelEl = document.createElement('div');
    labelEl.className = 'label';
    labelEl.textContent = label;
    box.appendChild(labelEl);

    const ph = document.createElement('div');
    ph.className = 'placeholder';
    ph.textContent = '여기에 끌어다 놓기';
    box.appendChild(ph);

    const status = document.createElement('div');
    status.className = 'status';
    box.appendChild(status);

    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    fileInput.style.display = 'none';
    box.appendChild(fileInput);

    // 클릭으로 파일 선택
    box.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => {
      if (e.target.files[0]) uploadFile(e.target.files[0], box, label, ph, status, labelEl);
    });

    // 드래그앤드롭
    box.addEventListener('dragover', e => { e.preventDefault(); box.classList.add('drag'); });
    box.addEventListener('dragleave', () => box.classList.remove('drag'));
    box.addEventListener('drop', e => {
      e.preventDefault();
      box.classList.remove('drag');
      if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0], box, label, ph, status, labelEl);
    });

    imgGrid.appendChild(box);
  });

  async function uploadFile(file, box, label, ph, status, labelEl) {
    if (!cfg.cloudName || !cfg.uploadPreset) {
      alert('설정 페이지에서 Cloudinary Cloud Name과 Upload Preset을 입력하세요.');
      return;
    }
    status.textContent = '업로드 중...';
    try {
      const url = await uploadToCloudinary(file);
      imageValues[label] = url;
      // 썸네일 표시
      ph.style.display = 'none';
      let img = box.querySelector('img');
      if (!img) {
        img = document.createElement('img');
        box.insertBefore(img, status);
      }
      img.src = url;
      box.classList.add('done');

      // X(삭제) 버튼 추가
      let delBtn = box.querySelector('.delBtn');
      if (!delBtn) {
        delBtn = document.createElement('div');
        delBtn.className = 'delBtn';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();   // 박스 클릭(파일 선택)으로 번지지 않게
          clearImage(box, label, ph, status);
        });
        box.appendChild(delBtn);
      }
      status.textContent = '✓ 완료';
    } catch (err) {
      status.textContent = '✗ 실패: ' + err;
    }
  }

  function clearImage(box, label, ph, status) {
    imageValues[label] = '';
    const img = box.querySelector('img');
    if (img) img.remove();
    const delBtn = box.querySelector('.delBtn');
    if (delBtn) delBtn.remove();
    box.classList.remove('done');
    ph.style.display = '';
    status.textContent = '';
    // 같은 파일 다시 올릴 수 있게 input 초기화
    const fi = box.querySelector('input[type=file]');
    if (fi) fi.value = '';
  }

  async function uploadToCloudinary(file) {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', cfg.uploadPreset);
    const res = await fetch('https://api.cloudinary.com/v1_1/' + cfg.cloudName + '/image/upload', {
      method: 'POST', body: fd,
    });
    const data = await res.json();
    if (data.secure_url) return data.secure_url;
    throw new Error(data.error ? data.error.message : '알 수 없는 오류');
  }

  // --- 시트 저장 ---
   document.getElementById('figmaBtn').addEventListener('click', () => {
    window.open('https://www.figma.com/design/li9jKwHidWLdqfMJlXo7U2/', '_blank');
  });
  // --- 한 번에 붙여넣기 분배 ---
  document.getElementById('distributeBtn').addEventListener('click', () => {
    const raw = document.getElementById('pasteBox').value;
    const distMsg = document.getElementById('distMsg');
    if (!raw.trim()) { distMsg.textContent = '붙여넣은 내용이 없습니다.'; return; }

    // 탭 또는 줄바꿈으로 분리 (탭 우선)
    let parts = raw.includes('\t') ? raw.split('\t') : raw.split('\n');
    parts = parts.map(s => s.trim());

    const inputs = valRow.querySelectorAll('input');
    let filled = 0;
    inputs.forEach((inp, i) => {
      if (i < parts.length) { inp.value = parts[i]; filled++; }
    });

    distMsg.textContent = `✓ ${filled}개 칸에 채웠습니다 (붙여넣은 항목 ${parts.length}개)`;
  });

  function saveToSheet() {
    const values = {};
    valRow.querySelectorAll('input').forEach(inp => { values[inp.dataset.key] = inp.value; });
    cfg.imageLabels.forEach(label => { values[label] = imageValues[label]; });

    const msg = document.getElementById('saveMsg');
    msg.textContent = '저장 중...';

    const iframe = document.createElement('iframe');
    iframe.name = 'sinkframe';
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    const form = document.createElement('form');
    form.action = cfg.scriptUrl;
    form.method = 'POST';
    form.target = 'sinkframe';

    const pw = document.createElement('input');
    pw.name = 'password'; pw.value = cfg.password;
    form.appendChild(pw);

    const vals = document.createElement('input');
    vals.name = 'values'; vals.value = JSON.stringify(values);
    form.appendChild(vals);

    document.body.appendChild(form);
    form.submit();

    setTimeout(() => {
      msg.textContent = '✓ 시트에 전송됨! (시트에서 확인하세요)';
      location.reload();
    }, 1500);
  }
</script>
</body>
</html>
