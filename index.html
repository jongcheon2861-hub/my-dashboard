<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상세페이지 대시보드</title>
  <style>
    body { font-family: sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; }
    label { display: block; margin-top: 16px; font-weight: bold; }
    input, textarea { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
    textarea { min-height: 120px; }
    button { margin-top: 12px; padding: 10px 20px; cursor: pointer; }
    .row { display: flex; gap: 8px; align-items: center; }
    .preview { max-width: 120px; margin-top: 8px; border: 1px solid #ddd; }
    .uploading { color: #999; }
    #saveMsg { margin-top: 12px; font-weight: bold; }
    .topbar { text-align: right; }
  </style>
</head>
<body>
  <div class="topbar"><a href="config.html">⚙ 설정</a></div>
  <h2>상품 상세페이지 입력</h2>

  <label>상품명 (title)</label>
  <input id="title">

  <label>설명 (description) — 웹 AI에서 복사해서 붙여넣기</label>
  <textarea id="description" placeholder="AI가 생성한 텍스트를 붙여넣으세요"></textarea>

  <label>가격 (price)</label>
  <input id="price">

  <label>메인 이미지</label>
  <div class="row">
    <input type="file" accept="image/*" onchange="uploadImage(this, 'image_main')">
  </div>
  <input id="image_main" placeholder="업로드하면 링크가 자동 입력됨">
  <img id="image_main_preview" class="preview" style="display:none">

  <label>서브 이미지</label>
  <div class="row">
    <input type="file" accept="image/*" onchange="uploadImage(this, 'image_sub')">
  </div>
  <input id="image_sub" placeholder="업로드하면 링크가 자동 입력됨">
  <img id="image_sub_preview" class="preview" style="display:none">

  <button onclick="saveToSheet()">시트에 저장</button>
  <p id="saveMsg"></p>

  <script>
    const cfg = {
      cloudName:    localStorage.getItem('cloudName'),
      uploadPreset: localStorage.getItem('uploadPreset'),
      scriptUrl:    localStorage.getItem('scriptUrl'),
      password:     localStorage.getItem('password'),
    };

    if (!cfg.cloudName || !cfg.scriptUrl) {
      alert('먼저 설정 페이지에서 값을 입력하세요.');
      location.href = 'config.html';
    }

    // Cloudinary unsigned upload (브라우저에서 직접, 비밀키 불필요)
    async function uploadImage(input, targetId) {
      const file = input.files[0];
      if (!file) return;
      const msgField = document.getElementById(targetId);
      msgField.value = '업로드 중...';

      const form = new FormData();
      form.append('file', file);
      form.append('upload_preset', cfg.uploadPreset);

      try {
        const res = await fetch(
          `https://api.cloudinary.com/v1_1/${cfg.cloudName}/image/upload`,
          { method: 'POST', body: form }
        );
        const data = await res.json();
        if (data.secure_url) {
          msgField.value = data.secure_url;
          const prev = document.getElementById(targetId + '_preview');
          prev.src = data.secure_url;
          prev.style.display = 'block';
        } else {
          msgField.value = '';
          alert('업로드 실패: ' + JSON.stringify(data));
        }
      } catch (e) {
        msgField.value = '';
        alert('업로드 오류: ' + e);
      }
    }

    // Apps Script로 전송 → 시트에 한 줄 추가
    async function saveToSheet() {
      const payload = {
        password:    cfg.password,
        title:       document.getElementById('title').value,
        description: document.getElementById('description').value,
        price:       document.getElementById('price').value,
        image_main:  document.getElementById('image_main').value,
        image_sub:   document.getElementById('image_sub').value,
      };

      const msg = document.getElementById('saveMsg');
      msg.textContent = '저장 중...';

      try {
        // Apps Script는 CORS 제약이 있어 text/plain으로 보냄
        const res = await fetch(cfg.scriptUrl, {
          method: 'POST',
          body: JSON.stringify(payload),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        });
        const data = await res.json();
        if (data.ok) {
          msg.textContent = '✓ 시트에 저장됨!';
          // 입력칸 초기화 (다음 상품 준비)
          ['title','description','price','image_main','image_sub'].forEach(id => {
            document.getElementById(id).value = '';
          });
          document.getElementById('image_main_preview').style.display = 'none';
          document.getElementById('image_sub_preview').style.display = 'none';
        } else {
          msg.textContent = '✗ 실패: ' + data.error;
        }
      } catch (e) {
        msg.textContent = '✗ 오류: ' + e;
      }
    }
  </script>
</body>
</html>
