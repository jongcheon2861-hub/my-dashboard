<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상세페이지 대시보드</title>
  <style>
    body { font-family: sans-serif; max-width: 1000px; margin: 30px auto; padding: 0 16px; }
    .topbar { text-align: right; }
    table { border-collapse: collapse; margin-top: 12px; }
    th, td { border: 1px solid #ccc; padding: 0; }
    th { background: #f3f3f3; padding: 6px 10px; white-space: nowrap; font-size: 13px; }
    td input { border: none; padding: 6px 10px; width: 140px; font-size: 13px; }
    td input:focus { outline: 2px solid #4a90d9; }
    .hint { color: #666; font-size: 13px; }
    button { margin-top: 16px; padding: 10px 20px; cursor: pointer; }
    .imgbox { margin-top: 24px; }
    .thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .thumbs figure { margin: 0; font-size: 11px; text-align: center; }
    .thumbs img { width: 90px; height: 90px; object-fit: cover; border: 1px solid #ddd; }
    #saveMsg { margin-top: 12px; font-weight: bold; }
    .scroll { overflow-x: auto; }
  </style>
</head>
<body>
  <div class="topbar"><a href="config.html">⚙ 설정</a></div>
  <h2>상품 상세페이지 입력</h2>

  <p class="hint">구글 시트에서 한 줄(헤더 제외)을 복사한 뒤, 아래 표 첫 칸을 클릭하고 Ctrl+V로 붙여넣으세요.</p>

  <div class="scroll">
    <table id="grid"><thead><tr id="headRow"></tr></thead>
      <tbody><tr id="valRow"></tr></tbody>
    </table>
  </div>

  <div class="imgbox">
    <h3>이미지 업로드 (여러 장 한 번에 선택)</h3>
    <input type="file" accept="image/*" multiple onchange="uploadImages(this)">
    <span id="upStatus" class="hint"></span>
    <div class="thumbs" id="thumbs"></div>
  </div>

  <button onclick="saveToSheet()">시트에 저장</button>
  <p id="saveMsg"></p>

  <script>
    const cfg = {
      fields:       (localStorage.getItem('fields') || '').split(',').map(s=>s.trim()).filter(Boolean),
      imageCount:   parseInt(localStorage.getItem('imageCount') || '0', 10),
      cloudName:    localStorage.getItem('cloudName'),
      uploadPreset: localStorage.getItem('uploadPreset'),
      scriptUrl:    localStorage.getItem('scriptUrl'),
      password:     localStorage.getItem('password'),
    };

    if (!cfg.scriptUrl || cfg.fields.length === 0) {
      alert('먼저 설정 페이지에서 항목과 URL을 입력하세요.');
      location.href = 'config.html';
    }

    const imageKeys = [];
    for (let i = 1; i <= cfg.imageCount; i++) imageKeys.push('image_' + i);

    // 표 헤더 + 입력칸 생성 (텍스트 항목 + 이미지 컬럼)
    const headRow = document.getElementById('headRow');
    const valRow  = document.getElementById('valRow');
    const allKeys = cfg.fields.concat(imageKeys);
    allKeys.forEach(key => {
      const th = document.createElement('th'); th.textContent = key; headRow.appendChild(th);
      const td = document.createElement('td');
      const inp = document.createElement('input'); inp.dataset.key = key;
      td.appendChild(inp); valRow.appendChild(td);
    });

    // 시트에서 복사한 탭 구분 데이터 붙여넣기 처리
    valRow.addEventListener('paste', (e) => {
      const text = (e.clipboardData || window.clipboardData).getData('text');
      if (!text.includes('\t') && !text.includes('\n')) return; // 일반 붙여넣기는 그대로
      e.preventDefault();
      const firstLine = text.split('\n')[0];      // 첫 줄만 사용 (한 상품)
      const cells = firstLine.split('\t');
      const startIndex = allKeys.indexOf(e.target.dataset.key); // 클릭한 칸부터 채움
      const inputs = valRow.querySelectorAll('input');
      cells.forEach((val, i) => {
        const target = inputs[startIndex + i];
        if (target) target.value = val.trim();
      });
    });

    // Cloudinary 여러 장 업로드
    async function uploadImages(input) {
      const files = Array.from(input.files);
      if (!cfg.cloudName || !cfg.uploadPreset) { alert('Cloudinary 설정이 필요합니다.'); return; }
      const status = document.getElementById('upStatus');
      const inputs = valRow.querySelectorAll('input');
      let done = 0;
      status.textContent = `0/${files.length} 업로드 중...`;

      for (let i = 0; i < files.length; i++) {
        const form = new FormData();
        form.append('file', files[i]);
        form.append('upload_preset', cfg.uploadPreset);
        try {
          const res = await fetch(`https://api.cloudinary.com/v1_1/${cfg.cloudName}/image/upload`,
            { method: 'POST', body: form });
          const data = await res.json();
          if (data.secure_url) {
            const key = 'image_' + (i + 1);
            inputs.forEach(inp => { if (inp.dataset.key === key) inp.value = data.secure_url; });
            addThumb(data.secure_url, key);
          }
        } catch (err) { console.error(err); }
        done++; status.textContent = `${done}/${files.length} 업로드 중...`;
      }
      status.textContent = `✓ ${done}장 완료`;
    }

    function addThumb(url, label) {
      const fig = document.createElement('figure');
      fig.innerHTML = `<img src="${url}"><figcaption>${label}</figcaption>`;
      document.getElementById('thumbs').appendChild(fig);
    }

    // 시트 저장
      async function saveToSheet() {
      const values = {};
      valRow.querySelectorAll('input').forEach(inp => { values[inp.dataset.key] = inp.value; });
      const msg = document.getElementById('saveMsg');
      msg.textContent = '저장 중...';
      try {
        await fetch(cfg.scriptUrl, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ password: cfg.password, values }),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        });
        msg.textContent = '✓ 시트에 전송됨! (시트에서 확인하세요)';
        valRow.querySelectorAll('input').forEach(inp => inp.value = '');
        document.getElementById('thumbs').innerHTML = '';
        document.getElementById('upStatus').textContent = '';
      } catch (e) {
        msg.textContent = '✗ 오류: ' + e;
      }
    }
  </script>
</body>
</html>
